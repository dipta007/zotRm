name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please remove any secrets (like your Zotero API key) from logs.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I ran `zotrm pull` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `zotrm ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste the command output. Run with `--dry-run` if helpful. Remove your API key.
      render: shell
  - type: input
    id: version
    attributes:
      label: zotrm version
      description: Output of `zotrm --help` header or the installed version.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: rmapi
    attributes:
      label: rmapi version
      description: Output of `rmapi version` (if relevant).
